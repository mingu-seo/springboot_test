<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Diary Demo</title>

  <!-- Before: 블로킹 CSS 4개 (실습에서 병합 예정)
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/card.css">
  <link rel="stylesheet" href="/css/theme.css">
   -->
  <link rel="stylesheet" href="/css/app.min.css">
  <link rel="preload" as="image"
        href="/images/test.webp"
        type="image/webp"
        fetchpriority="high">
</head>
<body>
<header>
  <h1>Emotion Diary</h1>
  <p id="status">로그인 중...</p>
</header>

<main>
  <section id="hero">
    <!-- Before: 대용량 PNG · 사이즈 속성 없음 → LCP 악화 + CLS 발생 -->
    <picture>
      <source srcset="/images/test.webp" type="image/webp">
      <img src="/images/test.png"
           alt="감정 다이어리 배너"
           width="300" height="100"
           class="hero-img"
           loading="eager"
           fetchpriority="high">
    </picture>
  </section>

  <section id="diary-list">
    <h2>최근 일기</h2>
    <ul id="list"></ul>
  </section>
</main>

<!-- Before: head 가 아닌 body 끝이지만 defer/async 없음 -->
<script src="/js/vendor.js" defer></script>
<script src="/js/app.js" defer></script>
</body>
</html>
