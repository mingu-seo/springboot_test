input {
  # Spring Boot 의 LogstashTcpSocketAppender 가 접속하는 입력
  tcp {
    port => 5044
    # logstash-logback-encoder 가 개행으로 구분된 JSON 라인을 보냄
    codec => json_lines
  }
}

filter {
  # logstash-logback-encoder 가 이미 보내주는 필드들:
  #  @timestamp, level, logger_name, message, thread_name,
  #  traceId (MDC), application, env (customFields)
  #
  # 추가 가공이 필요하면 여기에 작성
  if [level] {
    mutate {
      uppercase => [ "level" ]   # info → INFO 통일
    }
  }

  # 레벨별 태그 (Kibana 필터링 편의)
  if [level] == "ERROR" {
    mutate { add_tag => [ "error" ] }
  } else if [level] == "WARN" {
    mutate { add_tag => [ "warn" ] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # 일자별 인덱스 — 디스크 관리와 쿼리 속도에 유리
    index => "emotiondiary-%{+YYYY.MM.dd}"
  }

  # 개발 편의용 — Logstash 컨테이너 로그에도 찍어 디버깅
  stdout {
    codec => rubydebug { metadata => false }
  }
}