global:
  scrape_interval: 15s # 기본 수집 주기
  evaluation_interval: 15s

scrape_configs:
  # emotiondiary 애플리케이션 (호스트에서 뜬 bootRun)
  - job_name: "emotiondiary"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: "emotiondiary"
          env: "local"

  # Prometheus 자기 자신도 수집 (TSDB 크기, scrape 성공률 등)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
